<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WiFi Hotspot Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
padding:15px;
color:white;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border-radius:25px;
padding:20px;
margin-top:15px;
border:1px solid rgba(255,255,255,.2);
}

.logo{
display:block;
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:white;
padding:5px;
}

h1,h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin:10px 0;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.login{
background:white;
color:#2563eb;
}

.buy{
background:#16a34a;
color:white;
}

.zodiak{
background:#9333ea;
color:white;
}

.paket{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:10px 0;
background:rgba(255,255,255,.1);
border-radius:12px;
}

.small{
font-size:13px;
line-height:22px;
opacity:.9;
}

#hasilZodiak{
margin-top:15px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,.1);
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h1>WiFi Hotspot</h1>

<form name="login"
action="$(link-login-only)"
method="post">

<input type="hidden"
name="dst"
value="$(link-orig)">

<input type="hidden"
name="popup"
value="$(popup)">

<input
type="text"
name="username"
placeholder="Masukkan kode voucher"
required>

<input
type="hidden"
name="password">

<button class="login">
Login Voucher
</button>

</form>

</div>


<div class="card">

<h2>Paket Voucher</h2>

<div class="paket">
<span>1 Jam</span>
<button class="buy"
onclick="beli('1 Hari - Rp3.000')">
Beli
</button>
</div>

<div class="paket">
<span>2 Hari</span>
<button class="buy"
onclick="beli('3 Jam - Rp5.000')">
Beli
</button>
</div>

<div class="paket">
<span>Mingguan</span>
<button class="buy"
onclick="beli('Mingguan - Rp15.000')">
Beli
</button>
</div>

<div class="paket">
<span>Bulanan</span>
<button class="buy"
onclick="beli('Mingguan - Rp55.000')">
Beli
</button>
</div>

<div class="paket">
<span>Happy Home</span>
<button class="buy"
onclick="beli('Gamer - Rp115.000')">
Beli
</button>
</div>

</div>


<div class="card">

<h2>Status Voucher</h2>

<div class="small">
Kode: Belum login<br>
Status: Menunggu login<br>
Masa Aktif: ---
</div>

</div>


<div class="card">

<h2>Cara Pembelian</h2>

<div class="small">

1. Pilih paket voucher<br>
2. Klik beli paket<br>
3. Hubungi admin<br>
4. Admin memberikan kode voucher<br>
5. Masukkan kode lalu login

</div>

</div>


<div class="card">

<h2>Ramalan Zodiak</h2>

<select id="zodiak"
style="width:100%;
padding:14px;
border:none;
border-radius:12px;">

<option>Pilih Zodiak</option>
<option>Aries</option>
<option>Taurus</option>
<option>Gemini</option>
<option>Cancer</option>
<option>Leo</option>
<option>Virgo</option>
<option>Libra</option>
<option>Scorpio</option>
<option>Sagitarius</option>
<option>Capricorn</option>
<option>Aquarius</option>
<option>Pisces</option>

</select>

<button
class="zodiak"
onclick="ramal()">

Lihat Ramalan

</button>

<div id="hasilZodiak"></div>

</div>

</div>

<script>

document.login.password.value=
document.login.username.value;

document.login.username.onkeyup=function(){

document.login.password.value=
document.login.username.value;

}

function beli(paket){

alert(
"Anda memilih paket:\n"+
paket+
"\n\nHubungi admin untuk pembelian voucher."
);

}

function ramal(){

let z=
document.getElementById(
"zodiak"
).value;

let hasil=
document.getElementById(
"hasilZodiak"
);

hasil.style.display="block";

hasil.innerHTML=
"Zodiak "+z+
"<br><br>Hari ini peluang baik datang jika tetap fokus dan sabar.";

}

</script>

</body>
</html>
