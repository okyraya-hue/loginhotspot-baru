<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ＰＵＬｎｅｔ ＨＯＴｓｐｏｔPremium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#2563eb);
padding:15px;
color:white;
}

.box{
max-width:380px;
margin:auto;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:18px;
margin-top:15px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
}

.logo{
width:75px;
height:75px;
display:block;
margin:auto;
border-radius:50%;
background:white;
padding:5px;
object-fit:cover;
}

h2{
text-align:center;
margin:10px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
outline:none;
}

button{
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.login{
width:100%;
margin-top:10px;
background:white;
color:#2563eb;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(255,255,255,.1);
margin-top:8px;
border-radius:10px;
}

.buy{
background:#16a34a;
color:white;
}

.dana{
width:100%;
background:#0284c7;
color:white;
margin-top:10px;
}

.zodiak{
width:100%;
background:#9333ea;
color:white;
margin-top:10px;
}

#hasil{
margin-top:10px;
padding:10px;
display:none;
background:rgba(255,255,255,.1);
border-radius:10px;
}

footer{
margin-top:20px;
margin-bottom:10px;
}

.footer-box{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:15px;
border-radius:20px;
text-align:center;
}

.footer-title{
font-size:16px;
font-weight:bold;
margin-bottom:5px;
}

.footer-text{
font-size:13px;
opacity:.8;
margin-bottom:12px;
}

.footer-menu{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.footer-menu span{
padding:6px 10px;
border-radius:8px;
background:rgba(255,255,255,.1);
cursor:pointer;
font-size:12px;
}

.copyright{
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="box">

<div class="card">

<img src="logo.png" class="logo">
<h2>ＰＵＬｎｅｔ ＨＯTｓｐｏｔ</h2>
<form name="login"
action="$(link-login-only)"
method="post">

<input type="hidden"
name="dst"
value="$(link-orig)">

<input type="hidden"
name="popup"
value="true">

<input
type="text"
name="username"
placeholder="Masukkan Kode Voucher"
required>

<input
type="hidden"
name="password">

<button class="login">
Login Voucher
</button>

</form>

</div>


<div class="card">

<h2>Paket Voucher</h2>

<div class="item">
<span>1 Hari - Rp3.000</span>
<button class="buy"
onclick="beli('1 Hari Rp3.000')">
Beli
</button>
</div>

<div class="item">
<span>2 Hari - Rp5.000</span>
<button class="buy"
onclick="beli('3 Jam Rp5.000')">
Beli
</button>
</div>

<div class="item">
<span>Mingguan - Rp15.000</span>
<button class="buy"
onclick="beli('Mingguan Rp15.000')">
Beli
</button>
</div>

<div class="item">
<span>Bulanan - Rp55.000</span>
<button class="buy"
onclick="beli('Bulanan Rp55.000')">
Beli
</button>
</div>

<button class="dana"
onclick="alert('Pembayaran DANA :0895-1323-7203')">

Pembayaran DANA

</button>

</div>


<div class="card">

<h2>Ramalan Zodiak</h2>

<select id="z">

<option>Pilih Zodiak</option>
<option>Aries</option>
<option>Taurus</option>
<option>Gemini</option>
<option>Cancer</option>
<option>Leo</option>
<option>Virgo</option>
<option>Libra</option>
<option>Scorpio</option>
<option>Sagitarius</option>
<option>Capricorn</option>
<option>Aquarius</option>
<option>Pisces</option>

</select>

<button
class="zodiak"
onclick="ramal()">

Lihat Ramalan

</button>

<div id="hasil"></div>

</div>

<footer>

<div class="footer-box">

<div class="footer-title">
ＰＵＬＯｎｅｔ ＨＯＴｓｐｏｔ
</div>

<div class="footer-text">
Internet Positif Cepat • Stabil • Aman
</div>

<div class="footer-menu">

<span onclick="alert('Hubungi Admin')">
Admin
</span>

<span onclick="alert('Layanan 08:00-22:00')">
Jam
</span>

<span onclick="alert('Terima kasih menggunakan hotspot')">
Info
</span>

</div>

<div class="copyright">
© 2026 Markie Webbinger & ＰＵＬnet ＨＯＴｓｐｏｔ
</div>

</div>

</footer>

</div>

<script>

document.login.password.value=
document.login.username.value;

document.login.username.onkeyup=function(){

document.login.password.value=
document.login.username.value;

}

function beli(paket){

alert(
"Anda memilih:\n"+
paket+
"\n\nHubungi admin untuk pembelian voucher"
);

}

function ramal(){

let z=
document.getElementById("z").value;

let h=
document.getElementById("hasil");

h.style.display="block";

h.innerHTML=
"Zodiak "+z+
"<br><br>Hari ini peluang baik datang jika tetap fokus dan konsisten.";

}

</script>

</body>
</html>
